<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  
  <title>QR code component</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

    *{
      margin: 0px;
      padding: 0px;
      box-sizing: border-box;
    }
    :root{
      --Slate300: hsl(212, 45%, 89%);
      --Slate500: hsl(216, 15%, 48%);
      --Slate900: hsl(218, 44%, 22%);
    }

    body{
      background-color: var(--Slate300);
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }

    main{
      display: flex;
      flex-flow: column nowrap;

      background-color: white;
      border-radius: 10px;

      width: 300px;
      height: 450px;
      padding: 20px;

      text-align: center;   
    }
    
    #qrcode{
      width: 250px;
      height: 250px;

      border-radius: 10px;

      overflow: hidden;
      align-self: center;
      margin-bottom: 30px;
    }
    #qrcode>img{
      width: 100%;
      height: 100%;
    }

    main>h1{
      font-size: 1.3em;
      margin-bottom: 20px;
    }
    main>p{
      font-weight: 400;
    }
  </style>
</head>
<body>
  <main>
    <div id="qrcode"><img src="images/image-qr-code.png" alt="QR code"></div>
    <h1>Improve your front-end skills by building projects</h1>
    <p>Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
  </main>
</html>
