<!DOCTYPE html>
<html lang="pt-br">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Página inicial do Huddle</title>

  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }

    *{
      margin: 0px;
      padding: 0px;
    }
    :root{
      --Purple700: hsl(257, 40%, 49%);
      --Magenta400: hsl(300, 69%, 71%);
    }

    @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap');

    @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');


    body{
      background-image: url(images/bg-desktop.svg);
      background-color: var(--Purple700);
    }

    main{
      padding: 43px;
      display: flex;
      flex-flow: row wrap;
      justify-content: space-around;
      align-items: center;
    }

    #logo{
      width: 100%;
      margin-bottom: 35px;
    }
    #logo>img{
      width: 180px;
    }
    #imagemprincipal{
      width: 50%;
    }
    #imagemprincipal>img{
      width: 95%;
    }
    section{
      width: 40%;
      color: white;
    }
    section>h1{
      width: 80%;
      font-family: "Open Sans",sans-serif;
      line-height: 1.7em;
    }
    section>p{
      width: 80%;
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      line-height: 1.5em;
      margin: 15px 0px;
    }

    button{
      border: none;
      color: var(--Purple700);
      background-color: white;
      padding: 10px 45px;
      border-radius: 50px;
      box-shadow: 1px 1px 5px rgba(0, 0, 0, 0.519);
    }
    button:hover{
      cursor: pointer;
      color: white;
      background-color: var(--Magenta400);
    }

    #icones{
      display: flex;
      width: 80%;
      justify-content: end;
      align-items: start;
    }
    .iconeperfil{
      width: 35px;
      height: 35px;
      border-radius: 50%;
      border: 2px solid black;
      margin: 0px 0px 0px 10px;
    }
    .iconeperfil:hover{
      cursor: pointer;
      border: 2px solid var(--Magenta400);
      padding: 5px;
      margin-top: -10px;
    }

    @media screen and (orientation: portrait) {
      main{
        flex-flow: column nowrap;
        align-items: center;
        background-image: url(images/bg-mobile.svg);
        background-repeat: no-repeat;
        background-size: cover;
      }

      #imagemprincipal{
      width: 85%;
      margin-bottom: 50px;
    }

    section{
      width: 100%;
      justify-items: center;
      text-align: center;
    }

    section h1{
      width: 100%;
    }
    section p{
      width: 70%;
    }
    button{
      width: 170px;
    }
    #icones{
      justify-content: center;
      margin-top: 50px;
    }
    }

    
  </style>

</head>
<body>
  <main>
    <div id="logo"><img src="images/logo.svg" alt=""></div>

    <div id="imagemprincipal"><img src="images/illustration-mockups.svg" alt=""></div>
    
    <section>
      <h1>Build The Community Your Fans Will Love</h1>
      <p>
        Huddle re-imagines the way we build communities. You have a voice, but so does your audience.
        Create connections with your users as you engage in genuine discussion.
      </p>
      <button>Register</button>
    </section>

    <div id="icones">
      <div class="iconeperfil"><img src="images/facebook-f-brands-solid-full.svg" alt="icone facebook"></div>
      <div class="iconeperfil"><img src="images/twitter-brands-solid-full.svg" alt="icone twitter"></div>
      <div class="iconeperfil"><img src="images/instagram-brands-solid-full.svg" alt="icone instagram"></div>
    </div>
  </main>

</body>
</html>
